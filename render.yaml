services:
  - type: web
    name: infoworld-mirror
    runtime: node
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MIRROR_DOMAIN
          value: infoworld.media
        sync: false
      - key: CACHE_TTL
        value: 600
    healthCheckPath: /robots.txt
