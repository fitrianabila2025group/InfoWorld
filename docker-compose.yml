version: "3.8"

services:
  infoworld-mirror:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MIRROR_DOMAIN=${MIRROR_DOMAIN:-infoworld.media}
      - CACHE_TTL=${CACHE_TTL:-600}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/robots.txt"]
      interval: 30s
      timeout: 10s
      retries: 3
